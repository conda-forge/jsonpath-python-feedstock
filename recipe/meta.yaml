{% set name = "jsonpath-python" %}
{% set version = "1.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5846a2b914181f18a3931800af034bc990dc0cb513e4a8e0fbb0ad6392ab670a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - jsonpath
    - pip
    - hatchling
  run:
    - python >={{ python_min }}

test:
  imports:
    - jsonpath
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/zhangxianbing/jsonpath-python
  summary: A more powerful JSONPath implementation in modern python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
