schema_version: 1

context:
  name: jsonpath-python
  version: "1.1.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: ceea2efd9e56add09330a2c9631ea3d55297b9619348c1055e5bfb9cb0b8c538

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - jsonpath
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - jsonpath
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A more powerful JSONPath implementation in modern python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/zhangxianbing/jsonpath-python

extra:
  recipe-maintainers:
    - jan-janssen
